spring:
  application:
    # Spring Boot 애플리케이션 이름. 로그, 모니터링 도구에서 식별자로 사용된다.
    name: MyProject01

  datasource:
    # MySQL JDBC 드라이버 클래스. Spring Boot가 classpath에서 자동 감지하지만 명시하는 것이 안전하다.
    driver-class-name: com.mysql.cj.jdbc.Driver

    # JDBC 연결 URL 설명:
    #   localhost:3306 — MySQL 서버 주소:포트
    #   dbstudy        — 사용할 데이터베이스(스키마) 이름
    #   useSSL=false   — SSL 비활성화 (로컬 개발 환경에서 경고 방지)
    #   serverTimezone=Asia/Seoul — 서버 시간대를 한국 표준시(KST, UTC+9)로 설정
    #   allowPublicKeyRetrieval=true — MySQL 8.x caching_sha2_password 인증 시 필요
    #   characterEncoding=UTF-8 — 한글 등 다국어 문자 처리를 위한 인코딩 설정
    url: jdbc:mysql://localhost:3306/dbstudy?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

    # DB 접속 계정 (dbstudy 스키마에 권한이 있는 사용자)
    username: dbuser

    # DB 접속 비밀번호 (운영 환경에서는 환경변수나 Vault로 관리할 것)
    password: 1234

mybatis:
  # mapper XML 파일 위치. classpath는 src/main/resources를 가리킨다.
  # *.xml — resources/mapper/ 디렉터리 내 모든 XML 파일을 스캔한다.
  mapper-locations: classpath:mapper/*.xml

  # VO 클래스의 패키지 경로를 등록하여 mapper XML에서 전체 경로 대신
  # 단순 클래스명(예: GuestBookVO)으로 resultType/parameterType을 지정할 수 있게 한다.
  # 와일드카드(*)는 guestbook, common 등 모든 하위 도메인의 vo 패키지를 포함한다.
  type-aliases-package: com.study.myproject01.*.vo
